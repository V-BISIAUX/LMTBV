<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PiCam Robot</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    /* Variables CSS globales : couleurs et polices utilisées dans toute la page */
    :root {
      --bg:     #0a0c0f;
      --panel:  #111418;
      --border: #1e2530;
      --accent: #00d4ff;
      --red:    #ff4d4d;
      --orange: #f97316;
      --green:  #48bb78;
      --text:   #c8d6e5;
      --muted:  #4a5568;
      --panel2: #161b22;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* Mise en page principale : vidéo à gauche, panneau de données à droite */
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Courier New', monospace;
      height: 100vh;
      height: 100dvh;
      display: grid;
      grid-template-columns: 1fr 300px;
      overflow: hidden;
    }

    /*  Responsive : adaptation pour écrans  */
    @media (max-width: 900px) {
      body {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr;
        overflow: auto;
        height: auto;
      }
      .video-col {
        border-right: none;
        border-bottom: 1px solid var(--border);
        height: 50vw;
        min-height: 200px;
        max-height: 400px;
      }
      .video-col img {
        width: 100%; height: 100%;
        object-fit: contain;
      }
      aside {
        overflow-y: visible;
      }
      #map { height: 260px; }
      #no-fix { height: 260px; }
    }

    @media (max-width: 480px) {
      .section { padding: 12px 12px 10px; }
      .row { font-size: .74rem; }
      .row .v { font-size: .82rem; }
      #map { height: 220px; }
      #no-fix { height: 220px; }
    }

    .video-col {
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      border-right: 1px solid var(--border);
      position: relative;
    }
    .video-col img {
      width: 640px; height: 480px;
      display: block; image-rendering: auto;
    }

    aside {
      background: var(--panel);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    .status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 14px;
      background: var(--panel2);
      border-bottom: 1px solid var(--border);
      font-size: .65rem;
      color: var(--muted);
      letter-spacing: .05em;
      flex-shrink: 0;
    }
    .status-bar .sse-status { display: flex; align-items: center; gap: 5px; }
    .status-bar .sse-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--muted); transition: background .4s;
    }
    .status-bar .sse-dot.live { background: var(--green); box-shadow: 0 0 4px var(--green); }
    .status-bar .sse-dot.err  { background: var(--red); }
    #last-update { color: var(--muted); }

    /* Section générique : bloc avec titre et lignes de données */
    .section {
      padding: 16px 16px 14px;
      border-bottom: 1px solid var(--border);
    }
    .section-title {
      display: flex; align-items: center; gap: 7px; margin-bottom: 12px;
    }
    .section-title .name {
      font-size: .65rem; letter-spacing: .18em;
      text-transform: uppercase; color: var(--accent); font-weight: 700;
    }

    .row {
      display: flex; justify-content: space-between;
      align-items: baseline; padding: 6px 8px;
      border-bottom: 1px solid #1a2030; font-size: .78rem;
      border-radius: 4px;
    }
    /* Alternance de fond pour améliorer la lisibilité */
    .row:nth-child(odd)  { background: rgba(255,255,255,.03); }
    .row:nth-child(even) { background: transparent; }
    .row:last-child { border-bottom: none; padding-bottom: 6px; }
    .row .k { color: #7a90a8; letter-spacing: .02em; }       /* libellé de la clé */
    .row .v { color: #e8f0f8; font-weight: 700; font-size: .88rem; letter-spacing: .03em; } /* valeur */
    .row .v.hot { color: var(--red); }   /* valeur en rouge si température trop élevée */

    /* Indicateur GPS : point coloré + texte de statut */
    .fix-row {
      display: flex; align-items: center; gap: 6px;
      font-size: .7rem; color: var(--muted); margin-bottom: 12px;
    }
    .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--muted); transition: background .3s; flex-shrink: 0;
    }
    .dot.ok  { background: var(--green); box-shadow: 0 0 5px var(--green); }
    .dot.err { background: var(--red);   box-shadow: 0 0 5px var(--red); }

    /* Jauge de température */
    .gauge-wrap { margin-top: 10px; }
    .gauge-track {
      width: 100%; height: 7px; border-radius: 4px;
      background: #1a2030; overflow: hidden;
    }
    .gauge-fill {
      height: 100%; width: 0%; border-radius: 4px;
      transition: width .6s cubic-bezier(.4,0,.2,1), background .6s;
      background: #48bb78;
    }

    /* Badge indiquant le nombre de feux détectés dans la session */
    .fire-badge {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: .72rem; color: var(--orange); margin-bottom: 10px;
    }
    .fire-badge .count {
      background: var(--orange); color: #000;
      border-radius: 10px; padding: 1px 7px;
      font-weight: 700; font-size: .7rem;
    }
    /* Un élément de liste pour chaque feu détecté */
    .fire-item {
      display: flex; align-items: flex-start; gap: 7px;
      padding: 5px 0; border-bottom: 1px solid #1a2030; font-size: .7rem;
    }
    .fire-item:last-child { border-bottom: none; }
    .fire-item .fire-icon { font-size: 13px; flex-shrink: 0; line-height: 1.5; }
    .fire-item .fire-info { color: var(--muted); line-height: 1.5; }
    .fire-item .fire-time { color: var(--text); }

    /* Style des tooltips de la carte Leaflet */
    .leaflet-tooltip {
      background: #0d1117 !important;
      border: 1px solid var(--orange) !important;
      border-radius: 6px !important;
      color: var(--text) !important;
      font-family: 'Courier New', monospace !important;
      font-size: .72rem !important;
      line-height: 1.6 !important;
      padding: 7px 10px !important;
      box-shadow: 0 4px 16px rgba(0,0,0,.6) !important;
      white-space: pre-line !important;   /* permet les sauts de ligne (\n) dans le tooltip */
      max-width: 220px !important;
    }
    .leaflet-tooltip::before {
      border-top-color: var(--orange) !important;
    }
    /* Style des popups Leaflet (alternative au tooltip) */
    .leaflet-popup-content-wrapper {
      background: #0d1117 !important;
      border: 1px solid var(--orange) !important;
      color: var(--text) !important;
      font-family: 'Courier New', monospace !important;
      font-size: .73rem !important;
      border-radius: 6px !important;
      box-shadow: 0 4px 16px rgba(0,0,0,.6) !important;
    }
    .leaflet-popup-tip { background: #0d1117 !important; }

    #map-wrap { position: relative; border-top: 1px solid var(--border); }
    #map { width: 100%; height: 200px; }
    #no-fix {
      height: 200px; display: flex; align-items: center;
      justify-content: center; font-size: .72rem; color: var(--muted);
      flex-direction: column; gap: 6px;
    }
    #no-fix .no-fix-icon { font-size: 1.4rem; opacity: .3; }

    /* Bouton plein écran de la carte */
    #btn-fullscreen {
      position: absolute; top: 8px; right: 8px;
      background: var(--panel2); border: 1px solid var(--border);
      color: var(--text); font-size: 13px;
      width: 26px; height: 26px; border-radius: 4px;
      cursor: pointer; display: none;
      align-items: center; justify-content: center; z-index: 1000;
    }
    #btn-fullscreen:hover { background: #1c2230; }
    /* La carte prend toute la hauteur de l'écran en mode plein écran */
    #map-wrap:-webkit-full-screen #map,
    #map-wrap:fullscreen #map { height: 100vh; }
  </style>
</head>
<body>

  <!-- Colonne gauche -->
  <div class="video-col">
    <img src="/stream.mjpg" alt="stream"/>
  </div>

  <!-- Panneau latéral droit -->
  <aside>

    <!-- Barre de statut -->
    <div class="status-bar">
      <div class="sse-status">
        <div class="sse-dot" id="sse-dot"></div>
        <span id="sse-label">SSE déconnecté</span>
      </div>
      <span id="last-update">--:--:--</span>
    </div>

    <!-- Section capteur infrarouge MLX90614 -->
    <div class="section">
      <div class="section-title">
        <span class="name">MLX90614</span>
      </div>
      <div class="row"><span class="k">Ambiante</span>  <span class="v" id="amb">--.- °C</span></div>
      <div class="row"><span class="k">Objet</span>  <span class="v" id="obj">--.- °C</span></div>
      <!-- Jauge visuelle de la température objet -->
      <div class="gauge-wrap">
        <div class="gauge-track"><div class="gauge-fill" id="gauge-fill"></div></div>
      </div>
    </div>

    <!-- Section ESP8266 -->
    <div class="section">
      <div class="section-title"><span class="name">ESP8266</span></div>
      <div class="row"><span class="k">Température</span>  <span class="v" id="e-temp">-- °C</span></div>
      <div class="row"><span class="k">Humidité</span>  <span class="v" id="e-humi">-- %</span></div>
      <div class="row"><span class="k">Qualité air</span>  <span class="v" id="e-air">--</span></div>
    </div>

    <!-- Section GPS -->
    <div class="section">
      <div class="section-title"><span class="name">GPS</span></div>
      <!-- Point coloré : vert = fix actif, rouge = pas de fix -->
      <div class="fix-row">
        <div class="dot" id="fix-dot"></div>
        <span id="fix-text">Pas de fix GPS</span>
      </div>
      <div class="row"><span class="k">Latitude</span>  <span class="v" id="g-lat">--</span></div>
      <div class="row"><span class="k">Longitude</span>  <span class="v" id="g-lng">--</span></div>
      <div class="row"><span class="k">Altitude</span>  <span class="v" id="g-alt">--</span></div>
      <div class="row"><span class="k">Vitesse</span>  <span class="v" id="g-spd">--</span></div>
      <div class="row"><span class="k">Satellites</span>  <span class="v" id="g-sat">--</span></div>
    </div>

    <!-- Section feux détectés -->
    <div class="section">
      <div class="section-title"><span class="name">Feux détectés</span></div>
      <div class="fire-badge">
        <span>Cette session :</span>
        <span class="count" id="fire-count">0</span>
      </div>
    </div>

    <!-- Carte Leaflet -->
    <div id="map-wrap">
      <div id="no-fix">
        <span class="no-fix-icon">◎</span>
        En attente du fix GPS…
      </div>
      <div id="map" style="display:none"></div>
      <button id="btn-fullscreen" onclick="toggleFullscreen()" title="Plein écran">⛶</button>
    </div>

  </aside>

  <script>
    const $ = id => document.getElementById(id);

    let leafMap = null, robotMarker = null;
    const fireMarkers = [];   // liste des marqueurs de feux déjà ajoutés à la carte


    // Met à jour l'heure de dernière réception de données
    function setLastUpdate() {
      $('last-update').textContent = new Date().toLocaleTimeString('fr-FR');
    }

    // Met à jour la jauge de température
    // Bleu < 15°C, vert < 30°C, orange < 42°C, rouge au-delà
    function updateGauge(temp) {
      const pct   = Math.min(Math.max(temp / 50 * 100, 0), 100);
      const color = temp <= 15 ? '#63b3ed' : temp <= 30 ? '#48bb78' : temp <= 42 ? '#f6ad55' : '#ff4d4d';
      $('gauge-fill').style.width = pct + '%';
      $('gauge-fill').style.background = color;
    }

    // Initialise la carte Leaflet au premier fix GPS reçu
    function initMap(lat, lng) {
      $('no-fix').style.display = 'none';
      $('map').style.display    = 'block';
      $('btn-fullscreen').style.display = 'flex';
      leafMap = L.map('map').setView([lat, lng], 16);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap', maxZoom: 19,
      }).addTo(leafMap);
      robotMarker = L.marker([lat, lng]).addTo(leafMap);
    }

    // Déplace le marqueur du robot et recentre la carte sur sa position
    function updateMap(lat, lng) {
      if (!leafMap) { initMap(lat, lng); return; }
      robotMarker.setLatLng([lat, lng]);
      leafMap.panTo([lat, lng]);
    }

    // Bascule la carte en mode plein écran
    function toggleFullscreen() {
      const el = $('map-wrap');
      if (!document.fullscreenElement) {
        el.requestFullscreen().then(() => leafMap && leafMap.invalidateSize());
      } else {
        document.exitFullscreen();
      }
    }
    // Recalcule la taille de la carte après sortie du plein écran
    document.addEventListener('fullscreenchange', () => {
      leafMap && setTimeout(() => leafMap.invalidateSize(), 100);
    });

    // Icône 🔥 utilisée pour les marqueurs de feux sur la carte
    const fireIcon = L.divIcon({
      html: '<div style="font-size:18px;line-height:1">🔥</div>',
      iconSize: [22, 22], iconAnchor: [11, 11], className: '',
    });

    // Met à jour le compteur et les marqueurs de feux sur la carte
    function updateFireMarkers(fires) {
      $('fire-count').textContent = fires.length;

      fires.forEach(f => {
        const time = f.timestamp.replace('T', ' ').slice(0, 19) + ' UTC';

        const item = document.createElement('div');
        item.className = 'fire-item';
        item.innerHTML = `<span class="fire-icon">🔥</span>
          <span class="fire-info">
            <span class="fire-time">${time}</span><br>
            ${f.reasons.join(' · ')}
            ${f.gps_fix ? `<br>${f.lat.toFixed(5)}° ${f.lon.toFixed(5)}°` : ''}
          </span>`;

        // N'ajoute un marqueur que si la carte existe, que le feu a des coordonnées et qu'il n'est pas déjà affiché
        if (!leafMap || f.lat == null) return;
        if (fireMarkers.some(m => m.ts === f.timestamp)) return;
        const m = L.marker([f.lat, f.lon], { icon: fireIcon })
          .bindTooltip([time, ...f.reasons].join('\n'), { permanent: false, direction: 'top' })
          .addTo(leafMap);
        fireMarkers.push({ ts: f.timestamp, marker: m });
      });
    }

    // Ouvre une connexion SSE vers /temperature/stream et met à jour les températures MLX en temps réel
    // Erreur : reconnection automatiquement après 3 secondes
    function connectSSE() {
      const es = new EventSource('/temperature/stream');
      es.onopen = () => {
        $('sse-dot').className    = 'sse-dot live';
        $('sse-label').textContent = 'SSE connecté';
      };
      es.onmessage = e => {
        const d = JSON.parse(e.data);
        $('amb').textContent = d.ambient_c.toFixed(1) + ' °C';
        const objEl = $('obj');
        objEl.textContent = d.object_c.toFixed(1) + ' °C';
        objEl.className   = 'v' + (d.object_c > 50 ? ' hot' : '');
        updateGauge(d.object_c);
        setLastUpdate();
      };
      es.onerror = () => {
        $('sse-dot').className    = 'sse-dot err';
        $('sse-label').textContent = 'SSE déconnecté';
        es.close();
        setTimeout(connectSSE, 3000);
      };
    }

    // Récupère les données de l'ESP8266
    async function fetchEsp() {
      try {
        const r = await fetch('/esp/data');
        if (!r.ok) return;
        const d = await r.json();
        $('e-temp').textContent = d.temperature != null ? d.temperature + ' °C' : '--';
        $('e-humi').textContent = d.humidity    != null ? d.humidity    + ' %'  : '--';
        $('e-air').textContent  = d.air_label   ?? '--';
        const g = d.gps ?? {};
        const hasFix = g.fix && g.latitude != null && g.longitude != null;
        $('fix-dot').className    = 'dot ' + (hasFix ? 'ok' : 'err');
        $('fix-text').textContent = hasFix ? 'Fix GPS actif' : 'Pas de fix GPS';
        $('g-lat').textContent = g.latitude  != null ? g.latitude.toFixed(6)  + '°' : '--';
        $('g-lng').textContent = g.longitude != null ? g.longitude.toFixed(6) + '°' : '--';
        $('g-alt').textContent = g.altitude  != null ? g.altitude.toFixed(1)  + ' m' : '--';
        $('g-spd').textContent = g.speed_kmh != null ? g.speed_kmh.toFixed(1) + ' km/h' : '--';
        $('g-sat').textContent = g.satellites ?? '--';
        if (hasFix) updateMap(g.latitude, g.longitude);
        setLastUpdate();
      } catch(_) {}
    }

    // Récupère la liste des feux détectés et met à jour les marqueurs sur la carte
    async function fetchFires() {
      try {
        const fires = await fetch('/fires').then(r => r.ok ? r.json() : []);
        updateFireMarkers(fires);
      } catch(_) {}
    }

    // Démarrage : connexion SSE et chargement des données
    connectSSE();
    fetchEsp();
    fetchFires();
    // Rafraîchissement périodique
    setInterval(fetchEsp, 5000);
    setInterval(fetchFires, 10000);
  </script>
</body>
</html>
